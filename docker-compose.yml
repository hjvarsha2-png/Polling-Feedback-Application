version: '3.8'

services:
  # 1. Database Service
  mongodb:
    image: mongo:latest
    container_name: pollapp_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - pollapp_net

  # 2. Express Backend Service
  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: pollapp_server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/pollapp
      # Ensure other required env variables are here (e.g. JWT_SECRET)
    depends_on:
      - mongodb
    networks:
      - pollapp_net

  # 3. React Frontend Service
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: pollapp_client
    ports:
      - "80:80" 
      # Access your frontend on http://localhost:80
    depends_on:
      - server
    networks:
      - pollapp_net

volumes:
  mongodb_data:

networks:
  pollapp_net:
    driver: bridge
